openapi: 3.0.3
info:
  title: media-ingest-gateway
  version: 0.1.0
  description: >
    Accepts uploaded match video clips and stores them (Phase 2, first
    slice — docs/phases.md). Per rules.md Section 2.3, this file must stay
    in sync with the implementation; CI fails the build on drift once
    endpoints exist.

    Transport note: real venue-to-cloud transport is SRT/WebRTC per
    architecture.md Section 10; this is a plain authenticated HTTP upload
    for now since there's no edge-agent streaming client to receive from
    yet — see this service's README.

    Sync note: this service stores multi-camera time-sync offsets
    (architecture.md Section 5 assigns "time-synchronizes multi-camera
    feeds" to it directly); the actual cross-correlation computation runs
    externally in ml-pipeline/time-sync (docs/adr/0006) and is submitted
    here as an already-computed result.
paths:
  /healthz:
    get:
      summary: Liveness check
      responses:
        "200":
          description: OK

  /v1/organizations/{orgID}/matches/{matchID}/clips:
    post:
      summary: Upload a video clip
      description: >
        Request body is the clip's raw bytes (application/octet-stream).
        The server computes a SHA-256 hash of the content (the basic
        anti-tampering measure described in the implementation plan — full
        replay/liveness detection is deferred) and records it with the
        clip's metadata.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgID"
        - $ref: "#/components/parameters/MatchID"
        - name: camera_id
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Clip"
        "400":
          description: Invalid request (e.g. empty body, missing camera_id)
        "403":
          description: Caller does not belong to orgID, or lacks manage_matches-equivalent permission
    get:
      summary: List clips for a match
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgID"
        - $ref: "#/components/parameters/MatchID"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Clip"

  /v1/organizations/{orgID}/matches/{matchID}/clips/{clipID}:
    get:
      summary: Fetch a clip's metadata
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgID"
        - $ref: "#/components/parameters/MatchID"
        - $ref: "#/components/parameters/ClipID"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Clip"
        "404":
          description: Clip not found

  /v1/organizations/{orgID}/matches/{matchID}/clips/{clipID}/download:
    get:
      summary: Download a clip's raw bytes
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgID"
        - $ref: "#/components/parameters/MatchID"
        - $ref: "#/components/parameters/ClipID"
      responses:
        "200":
          description: OK
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Clip not found

  /v1/organizations/{orgID}/matches/{matchID}/clips/{clipID}/sync:
    put:
      summary: Submit a computed multi-camera sync offset for a clip
      description: >
        offset_ms and correlation_score are already-computed values (see
        ml-pipeline/time-sync's find_offset, docs/adr/0006) — this
        endpoint stores and evaluates them, it does not run the
        correlation itself. reference_clip_id must be another clip in the
        same match; a new submission replaces any previous sync record for
        this clip.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrgID"
        - $ref: "#/components/parameters/MatchID"
        - $ref: "#/components/parameters/ClipID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reference_clip_id, offset_ms, correlation_score]
              properties:
                reference_clip_id:
                  type: string
                offset_ms:
                  type: integer
                  description: Signed offset in milliseconds; positive means this clip lags the reference clip.
                correlation_score:
                  type: number
                  description: Normalized cross-correlation peak, -1.0 to 1.0. Compared against a confidence threshold to set sync_confident.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Clip"
        "400":
          description: Invalid request (e.g. self-referencing clip, correlation_score out of range)
        "403":
          description: Caller does not belong to orgID, or lacks organizer_admin
        "404":
          description: Clip or reference clip not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Tokens are issued by Identity & Access and verified here — this
        service holds no login/token-issuance endpoint of its own.

  parameters:
    OrgID:
      name: orgID
      in: path
      required: true
      schema:
        type: string
    MatchID:
      name: matchID
      in: path
      required: true
      schema:
        type: string
    ClipID:
      name: clipID
      in: path
      required: true
      schema:
        type: string

  schemas:
    Clip:
      type: object
      properties:
        id:
          type: string
        organization_id:
          type: string
        match_id:
          type: string
        camera_id:
          type: string
        content_hash:
          type: string
          description: Hex-encoded SHA-256 of the clip's bytes.
        size_bytes:
          type: integer
        uploaded_at:
          type: string
          format: date-time
        uploaded_by:
          type: string
        sync_offset_ms:
          type: integer
          nullable: true
          description: Present only after a sync offset has been submitted for this clip.
        sync_reference_clip_id:
          type: string
          nullable: true
        sync_correlation_score:
          type: number
          nullable: true
        sync_confident:
          type: boolean
          description: True if sync_correlation_score meets the confidence threshold (domain.MinSyncCorrelationScore).
        synced_at:
          type: string
          format: date-time
          nullable: true
